<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quest WebXR World</title>
    <style>
      body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
      #hud {
        position: fixed; top: 12px; left: 12px; z-index: 10;
        background: rgba(0,0,0,0.5); color: #fff; padding: 8px 10px; border-radius: 8px;
      }
      #hud small { opacity: 0.8; }
      #equation {
        background: rgba(100, 150, 255, 0.3); border: 2px solid #64F; 
        padding: 8px; margin-top: 8px; border-radius: 6px; font-family: monospace;
        font-size: 0.9em; color: #FFD700;
      }
    </style>
    <!-- A-Frame core -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <!-- THREE.js for raycasting (bundled with A-Frame, expose globally) -->
    <script>
      if (!window.THREE) {
        // THREE is bundled with A-Frame, but we make sure it's available
        document.addEventListener('aframe-loaded', () => {
          window.THREE = AFRAME.THREE;
        });
      }
    </script>
    <!-- Environment component for quick open-world feel -->
    <script src="https://cdn.jsdelivr.net/npm/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
    <!-- Optional extras (movement-controls) -->
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
    <!-- Socket.IO client served by our backend -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/app.js" defer></script>
  </head>
  <body>
    <div id="hud">
      <div><strong>Online:</strong> <span id="onlineCount">0</span></div>
      <div><strong>Easter Eggs Found:</strong> <span id="eggsFound">0</span> / 5</div>
      <div><strong>Block Color:</strong> 
        <button id="colorRed" style="background: #F44; color: #fff; padding: 2px 6px; cursor: pointer;">Red</button>
        <button id="colorGreen" style="background: #4F4; color: #000; padding: 2px 6px; cursor: pointer;">Green</button>
        <button id="colorBlue" style="background: #44F; color: #fff; padding: 2px 6px; cursor: pointer;">Blue</button>
        <button id="colorYellow" style="background: #FF4; color: #000; padding: 2px 6px; cursor: pointer;">Yellow</button>
        <button id="scanBtn" style="background: #9C27B0; color: #fff; padding: 2px 6px; cursor: pointer; margin-left: 10px;">🔍 Scan</button>
      </div>
      <small>Click to place blocks | Middle-click to remove | Shift+Click Easter eggs to collect</small>
      <div id="eggsList" style="font-size: 0.8em; margin-top: 5px; max-height: 80px; overflow-y: auto;"></div>
      <div id="equation">
        <strong>⚡ Equation Challenge:</strong><br>
        30x/b - 1/2 × 2 × √2 = f<br>
        <small>Solve: 30x/b - √2 = f</small>
      </div>
    </div>
    <a-scene renderer="antialias: true" vr-mode-ui="enabled: true">
      <!-- Player rig with movement controls (sticks on Quest) -->
      <a-entity id="rig" movement-controls="fly: false" position="0 1.6 0">
        <a-entity camera="near: 0.1" look-controls id="camera" raycaster="far: 100; objects: .buildable"></a-entity>
      </a-entity>

      <!-- Lighting -->
      <a-entity light="type: directional; color: #fff; intensity: 0.8" position="1 3 1"></a-entity>
      <a-entity light="type: ambient; color: #BBB"></a-entity>

      <!-- Quickly generate an open-world style environment -->
      <a-entity environment="preset: forest; ground: hills; groundTexture: walkernoise; skyType: atmosphere; lighting: distant; playArea: 5"></a-entity>

      <!-- A landmark to orient -->
      <a-box position="0 1 -3" depth="1" height="1" width="1" color="#4CC3D9" class="buildable"></a-box>
      
      <!-- Container for placed blocks -->
      <a-entity id="blocks-container"></a-entity>
    </a-scene>
  </body>
</html>
